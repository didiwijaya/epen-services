services:

  # ─────────────────────────────────────────────
  # KAFKA (KRaft mode, no Zookeeper)
  # ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CLUSTER_ID: "4L6g3nShT-eMCtK--X86sg"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cqrs-net

  # ─────────────────────────────────────────────
  # KAFKA UI (monitoring)
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_METRICS_PORT: 9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cqrs-net

  # ─────────────────────────────────────────────
  # MYSQL CQRS: WRITE (sumber kebenaran)
  # ─────────────────────────────────────────────
  mysql-write:
    image: mysql:8.0
    container_name: mysql-write
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: product_write
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-write-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cqrs-net

  # ─────────────────────────────────────────────
  # MYSQL CQRS: READ (read model, di-sync via Kafka)
  # ─────────────────────────────────────────────
  mysql-read:
    image: mysql:8.0
    container_name: mysql-read
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: product_read
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql-read-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cqrs-net

  # ─────────────────────────────────────────────
  # phpMyAdmin (akses kedua DB)
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      PMA_HOSTS: mysql-write,mysql-read
      PMA_ARBITRARY: 1
    ports:
      - "8082:80"
    depends_on:
      - mysql-write
      - mysql-read
    networks:
      - cqrs-net

  # ─────────────────────────────────────────────
  # MASTER DATA SERVICE
  # ─────────────────────────────────────────────
  master-data:
    build:
      context: ./master-data
      dockerfile: Dockerfile
    container_name: master-data-service
    ports:
      - "8002:8001"
    environment:
      KAFKA_BROKERS: kafka:9092
      NODE_ENV: production
      # CQRS MySQL
      MYSQL_WRITE_HOST: mysql-write
      MYSQL_WRITE_PORT: 3306
      MYSQL_WRITE_USER: user
      MYSQL_WRITE_PASSWORD: userpassword
      MYSQL_WRITE_DATABASE: product_write
      MYSQL_READ_HOST: mysql-read
      MYSQL_READ_PORT: 3306
      MYSQL_READ_USER: user
      MYSQL_READ_PASSWORD: userpassword
      MYSQL_READ_DATABASE: product_read
    depends_on:
      kafka:
        condition: service_healthy
      mysql-write:
        condition: service_healthy
      mysql-read:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cqrs-net

  # ─────────────────────────────────────────────
  # REKANAN REALTIME VIEWER (Kafka consumer + SSE)
  # ─────────────────────────────────────────────
  rekanan-realtime:
    build:
      context: ./rekanan-realtime
      dockerfile: Dockerfile
    container_name: rekanan-realtime
    environment:
      PORT: 3000
      KAFKA_BROKERS: kafka:9092
      READ_TOPIC: rekanan.read-model
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - cqrs-net

  # ─────────────────────────────────────────────
  # REKANAN READ MODEL PRODUCER (DB read -> Kafka)
  # ─────────────────────────────────────────────
  rekanan-read-producer:
    build:
      context: ./rekanan-read-producer
      dockerfile: Dockerfile
    container_name: rekanan-read-producer
    environment:
      KAFKA_BROKERS: kafka:9092
      MYSQL_READ_HOST: mysql-read
      MYSQL_READ_PORT: 3306
      MYSQL_READ_USER: user
      MYSQL_READ_PASSWORD: userpassword
      MYSQL_READ_DATABASE: product_read
      READ_TOPIC: rekanan.read-model
      POLL_INTERVAL_MS: 2000
    depends_on:
      kafka:
        condition: service_healthy
      mysql-read:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cqrs-net

volumes:
  kafka-data:
    driver: local
  mysql-write-data:
    driver: local
  mysql-read-data:
    driver: local


networks:
  cqrs-net:
    driver: bridge
